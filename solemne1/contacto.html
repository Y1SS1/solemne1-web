<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Straight to Heaven | Centro de Innovación y Software</title>
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <header class="navbar-custom">
        <div class="container-custom">
            <a class="navbar-brand-custom" href="index.html">Straight to Heaven</a>
            <nav>
                <ul class="nav-list-custom">
                    <li><a class="nav-link-custom" href="index.html">Inicio</a></li>
                    <li><a class="nav-link-custom" href="nosotros.html">Institución</a></li>
                    <li><a class="nav-link-custom" href="servicios.html">Servicios</a></li>
                    <li><a class="nav-link-custom" href="equipo.html">Equipo</a></li>
                    <li><a class="nav-link-custom" href="recursos.html">Recursos</a></li>
                    <li><a class="nav-link-custom active-custom" href="contacto.html">Contacto</a></li>
                    <li><a class="nav-link-custom" href="faq.html">FAQ</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container-custom py-5-custom">
        <div class="text-center-custom">
            <h1 class="title-main-custom">Contáctanos</h1>
            <p class="subtitle-custom">Envíanos tus consultas sobre nuestros servicios o proyectos.</p>
        </div>

        <div class="form-container-custom">
            <form action="#" method="POST">
                <div class="form-group-custom">
                    <label for="nombre">Nombre completo:</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="form-group-custom">
                    <label for="email">Correo electrónico:</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@correo.cl" required>
                </div>

                <div class="form-group-custom">
                    <label for="asunto">Asunto de interés:</label>
                    <select id="asunto" name="asunto" required>
                        <option value="">Selecciona una opción...</option>
                        <option value="desarrollo">Desarrollo Ágil</option>
                        <option value="contenedores">Contenedores Docker</option>
                        <option value="consultoria">Consultoría Web</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="form-group-custom">
                    <label for="mensaje">Tu mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe aquí tu consulta..." required></textarea>
                </div>

                <button type="submit" class="btn-custom">Enviar Mensaje</button>
            </form>
        </div>
    </main>

    <footer class="footer-custom">
        <p>© 2026 Straight to Heaven. Desarrollado por Victor Yissi y Diego Ramos | Contacto: victor.yissi@correo.cl</p>
    </footer>

</body>
</html>
